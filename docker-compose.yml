version: '3.8'

services:
  rakshak-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rakshak
      - RAKSHAK_RESPONSE_API_TOKEN=demo-token
    depends_on:
      - redis
      - neo4j

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  neo4j:
    image: neo4j:5.12
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/rakshak
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
